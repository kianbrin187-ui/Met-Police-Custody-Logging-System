<!DOCTYPE html>
<html>
<head>
<title>Metropolitan Police Service - Command Terminal</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body" onload="checkLogin(); initTheme(); loadDashboard();">

<div class="top-header">
    <div class="header-brand">
        <img
            class="header-logo"
            src="https://image2url.com/r2/default/images/1772982370001-4c5dd800-ec0f-4784-9b88-33df6766ce7c.jpg"
            alt="Metropolitan Police Service logo"
            referrerpolicy="no-referrer"
        >
        <div class="header-text">
            <div class="header-title">Metropolitan Police Service</div>
            <div class="header-subtitle">Custody Command Terminal</div>
        </div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle-btn">Switch to Dark Mode</button>
</div>

<div class="dashboard-layout">

    <div class="sidebar">

        <div class="sidebar-title">Navigation</div>

        <button onclick="loadDashboard()">Dashboard</button>

        <button onclick="viewReports()">View Reports</button>

        <button onclick="window.open('https://linktr.ee/PiggyanddoUKCR','_blank')">
            Useful Links
        </button>

        <button class="logout-btn" onclick="logout()">Logout</button>

    </div>

    <div id="main-content" class="main-content"></div>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>MET Command Terminal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BOOT SCREEN -->
<div id="boot-screen">
    <div class="boot-logo">
        <img src="https://i.postimg.cc/WzNLHJDT/a-mockup-of-the-potential-new-metropolitan-police-crest-v0-o852wyngoh5a1-(1).jpg">
    </div>
    <h1 class="boot-text">Metropolitan Police Service</h1>
    <p class="boot-loading">Booting Secure Command Terminal...</p>
</div>

<!-- LOGIN SCREEN -->
<div id="login-container" class="hidden">

<div class="login-box">

<div class="logo-circle">
<img src="https://i.postimg.cc/WzNLHJDT/a-mockup-of-the-potential-new-metropolitan-police-crest-v0-o852wyngoh5a1-(1).jpg">
</div>

<h2>Officer Authentication</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="loginUser()">ACCESS TERMINAL</button>

<p id="error"></p>

</div>
</div>

<script src="script.js"></script>

</body>
</html>

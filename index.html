<!DOCTYPE html>
<html>
<head>
<title>MET Command Access</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Boot Screen -->
<div id="boot">
    <h1>Metropolitan Police Service</h1>
    <p>Initialising Secure Terminal...</p>
</div>

<!-- Login -->
<div id="login-container">
    <div class="login-box">
        <h2>Officer Login</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <p id="error"></p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>

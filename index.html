<!DOCTYPE html>
<html>
<head>
    <title>Metropolitan Police Service - Secure Access</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div id="boot-screen">
    <h1>Metropolitan Police Service</h1>
    <p>Initialising Secure Command Terminal...</p>
</div>

<div class="login-wrapper">

    <div class="login-card">
        <h2>Command Terminal Access</h2>
        <p class="login-sub">Authorised Personnel Only</p>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Access System</button>

        <p id="error" class="error"></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Metropolitan Police Service - Secure Access</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div id="boot-screen">
    <img
        class="boot-logo"
        src="https://image2url.com/r2/default/images/1772982370001-4c5dd800-ec0f-4784-9b88-33df6766ce7c.jpg"
        alt="Metropolitan Police Service logo"
        referrerpolicy="no-referrer"
    >
    <h1>Metropolitan Police Service</h1>
    <p>Initialising Command Terminal...</p>
</div>

<div class="login-wrapper">

    <div class="login-card">
        <img
            class="login-logo"
            src="https://image2url.com/r2/default/images/1772982370001-4c5dd800-ec0f-4784-9b88-33df6766ce7c.jpg"
            alt="Metropolitan Police Service logo"
            referrerpolicy="no-referrer"
        >
        <h2>Command Terminal Login</h2>
        <p class="login-sub">Authorised Officers Only</p>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Access System</button>

        <p id="error" class="error"></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>

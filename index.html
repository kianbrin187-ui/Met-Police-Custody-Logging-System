<!DOCTYPE html>
<html>
<head>
<title>MET Command Access</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Boot Screen -->
<div id="boot-screen">
    <img class="boot-logo"
    src="https://i.postimg.cc/WzNLHJDT/a-mockup-of-the-potential-new-metropolitan-police-crest-v0-o852wyngoh5a1-(1).jpg">

    <h2>Metropolitan Police Service</h2>
    <p class="boot-text">Loading Secure Terminal...</p>
</div>

<!-- Login -->
<div id="login-container" class="hidden">

<div class="login-box">

<div class="login-logo-circle">
<img src="https://i.postimg.cc/WzNLHJDT/a-mockup-of-the-potential-new-metropolitan-police-crest-v0-o852wyngoh5a1-(1).jpg">
</div>

<h2>Officer Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="loginUser()">Login</button>

<p id="error"></p>

</div>
</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MET Command Database</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050d1a;
color:white;
}

/* Sidebar */

.sidebar{
width:230px;
height:100vh;
background:#00162e;
position:fixed;
padding-top:25px;
border-right:3px solid #caa400;
}

.sidebar h2{
text-align:center;
margin-bottom:40px;
}

.sidebar a{
display:block;
color:white;
padding:15px;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.sidebar a:hover{
background:#003e7e;
}

/* Main Panel */

.main{
margin-left:230px;
padding:40px;
}

.card{
background:#0a1f44;
padding:25px;
border-radius:12px;
margin-bottom:30px;
border:1px solid #caa400;
}

.logo{
width:120px;
}

.header{
display:flex;
align-items:center;
gap:20px;
}

.button{
display:inline-block;
padding:15px 30px;
margin-top:15px;
background:#003e7e;
color:white;
text-decoration:none;
border-radius:8px;
border:2px solid #caa400;
transition:0.3s;
}

.button:hover{
background:#0055a5;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="sidebar">
<h2>MET CONTROL</h2>

<a href="#arrest">Arrest Reports</a>

<a href="https://docs.google.com/spreadsheets/d/1gwpjY4qQ4U59kASsyFLvgkYKMdKCV0MOqqEBOn3cTqQ/edit"
target="_blank">
📂 View Custody Logs
</a>

<a href="https://linktr.ee/PiggyanddoUKCR" target="_blank">
🔗 Useful Links
</a>

</div>

<div class="main">

<div class="card header">
<img src="https://i.postimg.cc/WzNLHJDT/a-mockup-of-the-potential-new-metropolitan-police-crest-v0-o852wyngoh5a1-(1).jpg" class="logo">
<div>
<h1>Metropolitan Police Database</h1>
<p>Operational Command Panel</p>
</div>
</div>

<div id="arrest" class="card">
<h2>🚔 Arrest Submission</h2>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc0nEq5miwEXDaBhYyFhvJC1miMQuS8uXL7X6CX0c7yisyTlg/viewform?embedded=true"
width="100%" height="700"></iframe>

</div>

</div>

</body>
</html>

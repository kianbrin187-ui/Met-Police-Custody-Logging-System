<!DOCTYPE html>
<html>
<head>
  <title>Custody Booking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if (localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

<h2>Custody Booking Form</h2>
<button onclick="logout()">Logout</button>

<label>Officers:</label>
<input type="text" id="officers">

<label>Suspect:</label>
<input type="text" id="suspect">

<label>Reason:</label>
<input type="text" id="reason">

<label>Location:</label>
<input type="text" id="location">

<label>Time:</label>
<input type="datetime-local" id="time">

<label>Caution:</label>
<select id="caution">
<option>Yes</option>
<option>N/A</option>
</select>

<label>Searched:</label>
<select id="search">
<option>Yes</option>
<option>No</option>
</select>

<label>Items:</label>
<textarea id="items"></textarea>

<label>Force:</label>
<input type="text" id="force">

<label>Additional:</label>
<textarea id="additional"></textarea>

<button onclick="saveBooking()">Save Booking</button>

<script src="script.js"></script>

</body>
</html>
